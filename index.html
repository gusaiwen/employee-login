<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>员工登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
        }
        .logo h1 {
            font-size: 22px;
            color: #333;
            margin-top: 12px;
            font-weight: 600;
        }
        .logo p {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .form-group input:focus {
            border-color: #667eea;
            background: #fff;
        }
        .form-group input::placeholder {
            color: #bbb;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-login:active {
            transform: scale(0.97);
        }
        .btn-login:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #bbb;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .success-msg {
            color: #27ae60;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="icon">👤</div>
            <h1>员工登录</h1>
            <p>企业管理系统</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="username" placeholder="请输入工号 / 手机号" autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        <div class="footer">© 2024 企业管理系统</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('errorMsg');
            const successEl = document.getElementById('successMsg');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!username || !password) {
                errorEl.textContent = '请输入账号和密码';
                errorEl.style.display = 'block';
                return;
            }

            // 模拟登录（此处仅为前端DEMO，实际需要对接后端API）
            console.log('登录请求:', { username, password });

            successEl.textContent = '登录成功！正在跳转...';
            successEl.style.display = 'block';
        });
    </script>
</body>
</html>
